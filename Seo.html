<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Rank Checker</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
    <h1 class="text-2xl font-bold mb-6 text-center">SEO Rank Checker</h1>
    <form id="rankCheckerForm" class="space-y-4">
      <div>
        <label for="domain" class="block text-sm font-medium text-gray-700">Target Domain</label>
        <input type="text" id="domain" name="domain" required
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
      </div>
      <div>
        <label for="keyword" class="block text-sm font-medium text-gray-700">Keyword</label>
        <input type="text" id="keyword" name="keyword" required
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
      </div>
      <div>
        <label for="country" class="block text-sm font-medium text-gray-700">Country</label>
        <select id="country" name="country" required
                class="mt-1 block w-full px-3 py-2 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
          <option value="us">United States</option>
          <option value="in">India</option>
          <option value="uk">United Kingdom</option>
          <option value="au">Australia</option>
          <!-- Add more countries as needed -->
        </select>
      </div>
      <div>
        <button type="submit"
                class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
          Check Ranking
        </button>
      </div>
    </form>
    <div id="loading" class="mt-4 text-center text-gray-500 hidden">Checking...</div>
    <div id="result" class="mt-4 text-center text-lg font-semibold"></div>
  </div>

  <script>
    document.getElementById('rankCheckerForm').addEventListener('submit', async function(event) {
      event.preventDefault();

      // Show loading indicator
      const loadingElement = document.getElementById('loading');
      const resultElement = document.getElementById('result');
      loadingElement.classList.remove('hidden');
      resultElement.textContent = '';

      // Retrieve form data
      const domain = document.getElementById('domain').value.trim();
      const keyword = document.getElementById('keyword').value.trim();
      const country = document.getElementById('country').value;

      // Validate inputs
      if (!domain || !keyword || !country) {
        resultElement.textContent = 'Please fill in all fields.';
        loadingElement.classList.add('hidden');
        return;
      }

      // Google Custom Search API configuration
      const apiKey = 'YOUR_API_KEY'; // Replace with your actual API key
      const cx = 'YOUR_SEARCH_ENGINE_ID'; // Replace with your actual Search Engine ID
      const apiUrl = `https://www.googleapis.com/customsearch/v1?q=${encodeURIComponent(keyword)}&cx=${cx}&gl=${country}&key=${apiKey}`;

      try {
        // Fetch search results from Google Custom Search API
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error('Failed to fetch data from Google Custom Search API.');

        const data = await response.json();

        // Extract search results
        const items = data.items || [];

        // Find the ranking position of the target domain
        let position = -1;
        for (let i = 0; i < items.length; i++) {
          const resultDomain = new URL(items[i].link).hostname.replace(/^www\./, '');
          if (resultDomain === domain) {
            position = i + 1;
            break;
          }
        }

        // Display the result
        if (position > 0) {
          resultElement.textContent = `Your domain ranks at position ${position}.`;
          if (position <= 10) {
            resultElement.textContent += ' Congratulations! You are in the top 10.';
          }
        } else {
          resultElement.textContent = 'Not found in the top 10 results.';
        }
      } catch (error) {
        console.error('Error:', error);
        resultElement.textContent = 'An error occurred while fetching the ranking.';
      } finally {
        // Hide loading indicator
        loadingElement.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
